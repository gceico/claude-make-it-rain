name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Actions are SHA-pinned (not @v4) so a re-pointed tag can't run unexpected code.
# Comments track the human-readable version; bump the SHA + comment together
# (Dependabot does this automatically).
jobs:
  # Full suite (app + leaderboard server) across all supported platforms. Bun is
  # the package manager, test runner (bun:test), and bundler; a single Bun
  # version is used everywhere (pinned via package.json "packageManager").
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      # The unit tests never launch a window, so there is no need to download
      # the ~100 MB Electron binary during `bun install`.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test

  lint:
    name: lint
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run lint
      - run: bun run format:check

  # Build the Astro landing site the same way the server's Docker image does
  # (see server/Dockerfile), so a broken web/ build fails CI before deploy.
  web:
    name: web (Astro build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run build
        working-directory: web
      - run: bun run check
        working-directory: web
