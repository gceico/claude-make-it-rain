version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps the pin and the
  # human-readable version comment together, so the workflows' supply-chain
  # hardening stays maintainable (this also SHA-pins oven-sh/setup-bun@v2).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Dependencies for the Electron app. Bun is the package manager now (bun.lock),
  # but Dependabot's npm ecosystem reads package.json and understands Bun
  # lockfiles, so version bumps keep working.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      dev-dependencies:
        dependency-type: development

  # Dependencies for the Astro landing site (web/). The leaderboard server
  # itself has ZERO npm dependencies (bun:sqlite + Bun builtins only), so it has
  # no manifest to watch — web/ is the only place the deploy image installs from.
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
