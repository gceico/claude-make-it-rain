version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps the pin and the
  # human-readable version comment together, so the publish workflow's supply-chain
  # hardening stays maintainable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # npm dependencies for the Electron app.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      dev-dependencies:
        dependency-type: development

  # npm dependencies for the leaderboard server.
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
