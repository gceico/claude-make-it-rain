<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Make It Rain overlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
    pointer-events: none;
    user-select: none;
  }
  .emoji {
    position: absolute;
    top: 0;
    left: 0;
    will-change: transform, opacity;
    line-height: 1;
  }
  /* A "money stack": several bills layered with slight offsets/rotation so
     they read as a fanned wad of cash rather than a single 💵. */
  .stack {
    display: block;
  }
  .stack > span {
    position: absolute;
    left: 0;
    top: 0;
    line-height: 1;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
  }
</style>
</head>
<body>
<script>
  let activeCount = 0;
  let idleTimer = null;

  function animationStarted() {
    activeCount++;
    if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
  }

  function animationEnded() {
    activeCount--;
    if (activeCount <= 0) {
      activeCount = 0;
      // Debounce so staggered spawns don't hide the window between emoji.
      idleTimer = setTimeout(() => {
        if (activeCount === 0) window.bridge.overlayIdle();
      }, 500);
    }
  }

  // Animates any element falling from (x,y) by (dx,dy) while rotating, then
  // cleans it up. Shared by single emoji and composed money stacks.
  function animateFalling(el, { x, y, dx, dy, rotation, duration, fade }) {
    el.style.transform = `translate(${x}px, ${y}px)`;
    document.body.appendChild(el);
    animationStarted();

    const keyframes = [
      { transform: `translate(${x}px, ${y}px) rotate(0rad)`, opacity: 1 },
      { transform: `translate(${x + dx}px, ${y + dy}px) rotate(${rotation}rad)`, opacity: fade ? 0 : 1 },
    ];
    const anim = el.animate(keyframes, {
      duration: duration * 1000,
      easing: 'ease-in',
      fill: 'forwards',
    });
    anim.onfinish = () => {
      el.remove();
      animationEnded();
    };
  }

  function spawnEmoji({ symbol, size, ...motion }) {
    const el = document.createElement('div');
    el.className = 'emoji';
    el.textContent = symbol;
    el.style.fontSize = size + 'px';
    animateFalling(el, motion);
  }

  // Builds a layered stack of bills — a richer visual than a lone 💵.
  function makeStack(size) {
    const el = document.createElement('div');
    el.className = 'emoji stack';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    const layers = 4;
    for (let i = 0; i < layers; i++) {
      const bill = document.createElement('span');
      bill.textContent = '💵';
      bill.style.fontSize = size + 'px';
      // Fan the bills: stagger upward and tilt each one a little.
      bill.style.top = (-i * size * 0.16) + 'px';
      bill.style.left = ((i - (layers - 1) / 2) * size * 0.06) + 'px';
      bill.style.transform = `rotate(${(i - (layers - 1) / 2) * 4}deg)`;
      el.appendChild(bill);
    }
    return el;
  }

  function spawnStack({ size, ...motion }) {
    animateFalling(makeStack(size), motion);
  }

  const rand = (min, max) => min + Math.random() * (max - min);

  // Dollar-fly: bills dropping away from the tray item, staggered ~120ms apart.
  function flyBills({ count, anchor }) {
    const capped = Math.max(0, Math.min(count, 10));
    for (let i = 0; i < capped; i++) {
      setTimeout(() => {
        spawnEmoji({
          symbol: '💵',
          size: 28,
          x: anchor.x + anchor.width / 2 - 14 + rand(-6, 6),
          y: anchor.y + anchor.height,
          dx: rand(-60, 60),
          dy: rand(150, 250),
          rotation: rand(-0.6, 0.6),
          duration: 1.8,
          fade: true,
        });
      }, i * 120);
    }
  }

  // ── Coin/shimmer sound (Web Audio, synthesized — no audio files) ────────────
  let muted = false;
  let audioCtx = null;

  function getAudioContext() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }
    // The overlay window is non-focusable and gets no user gesture, so the
    // context can start (or get) suspended. Resuming here is a defensive
    // complement to the main-process autoplayPolicy override.
    if (audioCtx.state === 'suspended' && audioCtx.resume) audioCtx.resume();
    return audioCtx;
  }

  // A single bright, fast-decaying "ting".
  function ting(ctx, when, freq, peakGain) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, when);
    gain.gain.exponentialRampToValueAtTime(peakGain, when + 0.006);
    gain.gain.exponentialRampToValueAtTime(0.0001, when + 0.22);
    osc.connect(gain).connect(ctx.destination);
    osc.start(when);
    osc.stop(when + 0.26);
  }

  // A short, quiet cascade of coin tings to accompany the rain.
  function playCoinShimmer() {
    if (muted) return;
    const ctx = getAudioContext();
    if (!ctx) return;
    const NOTES = [1568, 2093, 2637, 3136, 3520]; // sparkly upper-register set
    const start = ctx.currentTime;
    for (let i = 0; i < 7; i++) {
      const freq = NOTES[Math.floor(Math.random() * NOTES.length)] * (0.99 + Math.random() * 0.02);
      ting(ctx, start + i * 0.07 + Math.random() * 0.02, freq, 0.05);
    }
  }

  // $100 celebration: full-screen shower of money emoji for ~6s.
  const RAIN_EMOJI = ['💵', '💸', '💰', '🤑'];
  let raining = false;

  function rain() {
    // If a rain is already showing, let it keep running rather than stacking.
    if (raining) return;
    raining = true;
    setTimeout(() => { raining = false; }, 6000);

    playCoinShimmer();

    const W = window.innerWidth;
    const H = window.innerHeight;
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const size = rand(20, 48);
        const motion = {
          x: rand(0, Math.max(1, W - size)),
          y: -size * 1.5,
          dx: rand(-80, 80),
          dy: H + size * 3,
          rotation: rand(-3, 3),
          duration: rand(2.5, 5),
          fade: false,
        };
        // Sprinkle in some fat money stacks amongst the single emoji.
        if (Math.random() < 0.2) {
          spawnStack({ size: size * 1.1, ...motion });
        } else {
          spawnEmoji({ symbol: RAIN_EMOJI[Math.floor(Math.random() * RAIN_EMOJI.length)], size, ...motion });
        }
      }, rand(0, 1500));
    }
  }

  window.bridge.onFlyBills(flyBills);
  window.bridge.onRain(rain);
  window.bridge.onSetMuted((m) => { muted = m; });
</script>
</body>
</html>
